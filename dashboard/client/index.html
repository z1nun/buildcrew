<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>buildcrew dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d12;
        --panel: #12151c;
        --border: #232836;
        --text: #e8ecf4;
        --muted: #8a93a7;
      }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg); color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        height: 100%; overflow: hidden;
      }
      #app { position: fixed; inset: 0; }
      #statusbar {
        position: fixed; bottom: 0; left: 0; right: 0;
        padding: 6px 12px;
        background: rgba(11,13,18,0.82);
        backdrop-filter: blur(4px);
        border-top: 1px solid var(--border);
        font-size: 11px; color: var(--muted);
        display: flex; justify-content: space-between; align-items: center;
        z-index: 10;
      }
      #statusbar .live::before { content: "● "; color: #7ee0a2; }
      #statusbar .dead::before { content: "○ "; color: #ff5a63; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="statusbar">
      <span id="conn" class="dead">connecting…</span>
      <span id="count">0 events</span>
      <span>buildcrew dashboard · Part A</span>
    </div>

    <!-- Phaser 3 from jsdelivr CDN (pinned version for reproducibility) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
