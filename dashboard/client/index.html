<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>buildcrew town</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #2a2420;
        --bg-panel: #332a24;
        --wood: #8b6f47;
        --wood-dark: #5c4a30;
        --wood-light: #c9a876;
        --cream: #f5ebd7;
        --cream-muted: #b8a88c;
        --warn: #f2b24a;
        --crit: #ff8566;
        --ok: #a8d994;
        --info: #5aa9ff;
      }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg); color: var(--cream);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        height: 100%; overflow: hidden;
      }
      /* Main split: Phaser canvas on left, log panel on right.
       * Log panel collapses via media queries and can be toggled on any screen. */
      :root {
        --log-width: 460px;
      }
      #stage {
        position: fixed;
        top: 0; left: 0; bottom: 32px; right: var(--log-width);
        overflow: hidden;
        transition: right 0.2s ease-out;
      }
      body.log-hidden #stage { right: 0; }
      #app { position: absolute; inset: 0; }
      #logpanel {
        position: fixed;
        top: 0; right: 0; bottom: 32px;
        width: var(--log-width);
        background: var(--bg-panel);
        border-left: 2px solid var(--wood);
        display: flex;
        flex-direction: column;
        font-size: 13px;
        transition: transform 0.2s ease-out;
      }
      body.log-hidden #logpanel { transform: translateX(100%); }

      /* Medium screens — narrower sidebar */
      @media (max-width: 1200px) {
        :root { --log-width: 380px; }
      }
      @media (max-width: 900px) {
        :root { --log-width: 320px; }
        .lp-controls select, .lp-controls button { font-size: 11px; padding: 3px 6px; }
        .lp-row-body { font-size: 12px; }
        .lp-bubble-body { font-size: 12px; }
      }
      /* Small screens — sidebar becomes overlay, town gets full width */
      @media (max-width: 700px) {
        :root { --log-width: 100vw; }
        #stage { right: 0 !important; }
        #logpanel {
          transform: translateX(100%);
          max-width: 420px;
          box-shadow: -4px 0 12px rgba(0,0,0,0.4);
        }
        body:not(.log-hidden) #logpanel { transform: translateX(0); }
      }
      /* Project/session picker strip above the tabs */
      .lp-project {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: #1a1410;
        border-bottom: 1px solid var(--wood-dark);
        font-size: 11px;
        color: var(--cream-muted);
      }
      .lp-project-icon { color: var(--wood-light); }
      .lp-project-path {
        color: var(--cream);
        font-family: ui-monospace, monospace;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .lp-project-pill {
        padding: 2px 7px;
        background: var(--wood-dark);
        border: 1px solid var(--wood);
        border-radius: 3px;
        font-size: 10px;
        cursor: default;
      }
      /* Session chip row (between project strip and main header) */
      .lp-session-tabs {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 8px 14px;
        background: rgba(26,20,16,0.7);
        border-bottom: 1px solid var(--wood-dark);
        scrollbar-width: thin;
        scrollbar-color: var(--wood) transparent;
      }
      .lp-session-tabs::-webkit-scrollbar { height: 4px; }
      .lp-session-tabs::-webkit-scrollbar-thumb { background: var(--wood); border-radius: 2px; }
      .lp-session-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        background: transparent;
        color: var(--cream-muted);
        border: 1px solid var(--wood-dark);
        border-radius: 12px;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .lp-session-chip:hover {
        border-color: var(--wood-light);
        color: var(--cream);
      }
      .lp-session-chip.active {
        background: var(--wood);
        color: var(--cream);
        border-color: var(--wood-light);
      }
      .lp-chip-dot {
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
      }
      .lp-header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--wood-dark);
        background: var(--wood-dark);
      }
      .lp-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 10px;
      }
      .lp-tab {
        background: var(--bg);
        color: var(--cream-muted);
        border: 1px solid var(--wood);
        padding: 5px 12px;
        font: inherit;
        font-size: 12px;
        border-radius: 4px;
        cursor: pointer;
        letter-spacing: 1px;
      }
      .lp-tab.active {
        background: var(--wood);
        color: var(--cream);
        border-color: var(--wood-light);
      }
      .lp-tab:hover:not(.active) { border-color: var(--wood-light); }
      .lp-title {
        font-weight: bold;
        font-size: 13px;
        letter-spacing: 2px;
        color: var(--cream);
      }
      /* Dialogue bubbles */
      .lp-bubble {
        padding: 10px 14px;
        border-bottom: 1px solid var(--wood-dark);
        line-height: 1.5;
        cursor: pointer;
      }
      .lp-bubble:hover { background: rgba(139,111,71,0.1); }
      .lp-bubble-ts {
        font-size: 10px;
        color: var(--cream-muted);
        margin-bottom: 3px;
      }
      .lp-bubble-body {
        font-size: 13px;
        color: var(--cream);
        word-break: break-word;
      }
      .lp-bubble-who {
        display: inline-block;
        font-weight: bold;
        color: var(--wood-light);
        margin-right: 6px;
        font-size: 12px;
      }
      .lp-bubble-dur {
        color: var(--cream-muted);
        font-size: 11px;
        margin-left: 4px;
      }
      .lp-bubble-from-lead {
        background: rgba(139,111,71,0.06);
        border-left: 3px solid var(--wood-light);
      }
      .lp-bubble-from-agent {
        background: rgba(168,217,148,0.05);
        border-left: 3px solid var(--ok);
      }
      .lp-bubble-issue {
        border-left: 3px solid var(--warn);
      }
      .lp-bubble-issue-critical {
        background: rgba(255,133,102,0.08);
        border-left-color: var(--crit);
      }
      .lp-bubble-stage {
        background: rgba(255,217,102,0.06);
        border-left: 3px solid #ffd966;
        padding: 14px;
      }
      .lp-bubble-stage-head {
        font-weight: bold;
        font-size: 14px;
        letter-spacing: 2px;
        color: #ffd966;
        margin-bottom: 4px;
      }
      .lp-bubble-system {
        background: rgba(184,168,140,0.08);
        font-style: italic;
        color: var(--cream-muted);
      }
      .lp-bubble-warning {
        background: rgba(255,133,102,0.1);
        border-left: 3px solid var(--crit);
        border-top: 1px solid var(--crit);
        border-bottom: 1px solid var(--crit);
      }
      .lp-bubble-warning .lp-bubble-ts { color: var(--crit); font-weight: bold; }
      .lp-bubble-warning .lp-bubble-who { color: var(--crit); }
      /* Terminal lines */
      .lp-term-line {
        padding: 4px 14px;
        font-size: 12px;
        font-family: ui-monospace, monospace;
        white-space: pre-wrap;
        word-break: break-word;
        border-bottom: 1px solid rgba(92,74,48,0.3);
      }
      .lp-term-out { color: var(--cream); }
      .lp-term-err { color: var(--crit); background: rgba(255,133,102,0.05); }
      .lp-term-meta {
        color: var(--wood-light);
        background: rgba(139,111,71,0.12);
        font-style: italic;
        font-weight: bold;
      }
      /* Command input — always-present footer inside the log panel.
       * Only visible when Terminal tab is active (controlled via body[data-tab]). */
      .lp-input-area {
        display: none;
        flex-direction: column;
        gap: 4px;
        padding: 10px 14px;
        background: #1a1410;
        border-top: 2px solid var(--wood);
      }
      body[data-tab="terminal"] .lp-input-area { display: flex; }
      .lp-input-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .lp-input-prompt {
        color: var(--wood-light);
        font-weight: bold;
        font-size: 15px;
        user-select: none;
      }
      #cmd-input {
        flex: 1;
        background: transparent;
        border: 1px solid var(--wood-dark);
        color: var(--cream);
        font-family: inherit;
        font-size: 13px;
        padding: 7px 10px;
        border-radius: 4px;
        outline: none;
        caret-color: var(--wood-light);
      }
      #cmd-input:focus { border-color: var(--wood-light); }
      #cmd-input::placeholder { color: var(--cream-muted); font-style: italic; }
      #cmd-input:disabled { opacity: 0.5; }
      #cmd-send {
        background: var(--wood);
        border: 1px solid var(--wood-light);
        color: var(--cream);
        font: inherit;
        font-size: 11px;
        padding: 7px 14px;
        border-radius: 4px;
        cursor: pointer;
        letter-spacing: 1px;
      }
      #cmd-send:disabled { opacity: 0.4; cursor: not-allowed; }
      #cmd-send:hover:not(:disabled) { background: var(--wood-light); color: #1a1410; }
      .lp-input-status {
        font-size: 10px;
        color: var(--cream-muted);
        text-align: right;
      }
      .lp-input-status.running { color: var(--warn); }
      .lp-input-status.running::before {
        content: "◉ ";
        animation: pulse 1.2s infinite;
      }
      @keyframes pulse { 50% { opacity: 0.3; } }
      .lp-controls {
        display: flex;
        gap: 6px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .lp-controls select, .lp-controls button {
        background: var(--bg);
        color: var(--cream);
        border: 1px solid var(--wood);
        padding: 4px 8px;
        font: inherit;
        font-size: 12px;
        border-radius: 3px;
        cursor: pointer;
      }
      .lp-controls select:hover, .lp-controls button:hover {
        border-color: var(--wood-light);
      }
      .lp-meta {
        padding: 8px 14px;
        font-size: 12px;
        color: var(--cream-muted);
        border-bottom: 1px solid var(--wood-dark);
      }
      .lp-rows {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .lp-rows::-webkit-scrollbar {
        width: 8px;
      }
      .lp-rows::-webkit-scrollbar-thumb {
        background: var(--wood-dark);
        border-radius: 4px;
      }
      .lp-row {
        padding: 8px 14px;
        border-bottom: 1px solid var(--wood-dark);
        cursor: pointer;
        line-height: 1.45;
      }
      .lp-row:hover {
        background: rgba(139,111,71,0.15);
      }
      .lp-row-top {
        display: flex;
        gap: 8px;
        align-items: baseline;
        font-size: 12px;
      }
      .lp-ts { color: var(--cream-muted); font-family: ui-monospace, monospace; }
      .lp-type { font-weight: bold; font-size: 12px; letter-spacing: 0.5px; }
      .lp-agent {
        color: var(--wood-light);
        background: rgba(139,111,71,0.25);
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 12px;
      }
      .lp-sid {
        font-size: 10px;
        padding: 0 5px;
        border-radius: 3px;
        background: rgba(0,0,0,0.3);
        font-family: ui-monospace, monospace;
      }
      .lp-row-body {
        margin-top: 4px;
        font-size: 13px;
        color: var(--cream);
        word-break: break-word;
      }
      .lp-row-body code {
        background: rgba(0,0,0,0.3);
        padding: 2px 5px;
        border-radius: 3px;
        font-size: 12px;
        color: var(--wood-light);
      }
      .lp-muted { color: var(--cream-muted); font-style: italic; }
      .lp-stage { color: var(--warn); font-weight: bold; }
      .lp-sev { padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: bold; }
      .lp-sev-critical { background: #4a1c18; color: var(--crit); }
      .lp-sev-high { background: #3c2818; color: var(--warn); }
      .lp-sev-med { background: #3c2818; color: var(--warn); }
      .lp-row-detail {
        margin-top: 8px;
        padding: 8px 10px;
        background: rgba(0,0,0,0.4);
        border-left: 2px solid var(--wood);
        font-size: 12px;
        color: var(--cream-muted);
        white-space: pre-wrap;
        word-break: break-word;
        overflow-x: auto;
      }
      /* Status bar */
      #statusbar {
        position: fixed; bottom: 0; left: 0; right: 0;
        height: 32px; box-sizing: border-box;
        padding: 0 12px;
        background: rgba(42,36,32,0.95);
        border-top: 2px solid var(--wood);
        font-size: 11px; color: var(--cream-muted);
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px;
        z-index: 10;
      }
      #statusbar .live::before { content: "🟢 "; }
      #statusbar .dead::before { content: "⚫ "; }
      #sfx-toggle {
        background: none;
        border: 1px solid var(--wood);
        color: var(--cream-muted);
        font: inherit;
        padding: 2px 8px;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="app"></div>
    </div>
    <div id="logpanel"></div>
    <div id="statusbar">
      <span id="conn" class="dead">connecting…</span>
      <span id="count">0 events</span>
      <span id="sessions-badge" class="sb-badge" title="active sessions — click to filter">0 sessions</span>
      <span style="flex: 1"></span>
      <button id="btn-pause" class="sb-btn" title="pause event stream">⏸ pause</button>
      <button id="btn-export" class="sb-btn" title="download session as JSONL">⇩ export</button>
      <button id="btn-toggle-log" class="sb-btn" title="show/hide log panel">📋 log</button>
      <span class="sb-label">🏠 buildcrew town</span>
    </div>
    <style>
      #statusbar .sb-btn {
        background: none;
        border: 1px solid var(--wood);
        color: var(--cream-muted);
        font: inherit;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 4px;
        cursor: pointer;
      }
      #statusbar .sb-btn:hover { border-color: var(--wood-light); color: var(--cream); }
      #statusbar .sb-btn.active { background: var(--wood); color: var(--cream); }
      #statusbar .sb-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border: 1px solid var(--wood);
        border-radius: 10px;
        font-size: 10px;
        color: var(--cream-muted);
        cursor: pointer;
      }
      #statusbar .sb-badge:hover { border-color: var(--wood-light); color: var(--cream); }
      #statusbar .sb-badge .sb-dot {
        width: 7px; height: 7px; border-radius: 50%;
        display: inline-block;
      }
      @media (max-width: 700px) {
        #statusbar { font-size: 10px; gap: 6px; padding: 0 8px; }
        #statusbar .sb-label { display: none; }
        #statusbar .sb-btn { padding: 2px 6px; font-size: 10px; }
        #statusbar .sb-badge { font-size: 9px; }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
