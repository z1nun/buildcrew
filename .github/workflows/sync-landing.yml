name: Sync Landing Page

on:
  push:
    branches: [main]
    paths:
      - '.github/landing.html'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout buildcrew
        uses: actions/checkout@v4

      - name: Push to landing repo
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.LANDING_SYNC_TOKEN }}
        with:
          source_file: '.github/landing.html'
          destination_repo: 'z1nun/buildcrew-landing'
          destination_file: 'index.html'
          user_email: 'z1nun@users.noreply.github.com'
          user_name: 'z1nun'
          commit_message: 'sync: update landing page from buildcrew'
